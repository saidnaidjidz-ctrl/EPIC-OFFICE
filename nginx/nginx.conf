##############################################################################
#  NGINX — Epic Club Reverse Proxy Configuration
#  Handles: SSL termination, rate limiting, gzip compression, security headers
##############################################################################

# ─── Worker Settings ──────────────────────────────────────────────────────────
user  nginx;
worker_processes  auto;       # Scale to CPU core count automatically
worker_rlimit_nofile  65535;  # Max open file descriptors per worker

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging Format ───────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # ─── Core Performance ─────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;   # Hide nginx version

    # ─── Gzip Compression ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ─── Rate Limiting Zones ──────────────────────────────────────────────────
    # General API rate limit: 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Strict auth endpoint rate limit: 2 requests/second per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=2r/s;

    # SSE stream connections: 1 concurrent connection per IP
    limit_conn_zone $binary_remote_addr zone=sse_conn:10m;

    limit_req_status 429;
    limit_conn_status 429;

    # ─── Upstream Services ────────────────────────────────────────────────────
    upstream backend_api {
        server backend:5000;
        keepalive 32;                   # Keep upstream connections alive
    }

    upstream frontend_app {
        server frontend:3000;
        keepalive 16;
    }

    # ─── Shared Proxy Headers ────────────────────────────────────────────────
    # (Re-used via include in each location block)
    proxy_http_version      1.1;
    proxy_set_header        Upgrade             $http_upgrade;
    proxy_set_header        Connection          "upgrade";
    proxy_set_header        Host                $host;
    proxy_set_header        X-Real-IP           $remote_addr;
    proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto   $scheme;
    proxy_cache_bypass      $http_upgrade;
    proxy_read_timeout      60s;
    proxy_connect_timeout   10s;
    proxy_send_timeout      30s;

    # ─── HTTP Server (Redirect to HTTPS) ─────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow Let's Encrypt ACME challenges for cert renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS Main Server ────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;           # Replace with your actual domain in production

        # ── SSL/TLS Configuration ─────────────────────────────────────────────
        ssl_certificate         /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key     /etc/nginx/ssl/privkey.pem;
        ssl_session_cache       shared:SSL:10m;
        ssl_session_timeout     10m;
        ssl_protocols           TLSv1.2 TLSv1.3;
        ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_stapling            on;
        ssl_stapling_verify     on;

        # ── Security Headers ──────────────────────────────────────────────────
        add_header X-Content-Type-Options       "nosniff"                         always;
        add_header X-Frame-Options              "SAMEORIGIN"                       always;
        add_header X-XSS-Protection             "1; mode=block"                   always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-src https://accounts.google.com;" always;

        # ── Max Request Body Size ─────────────────────────────────────────────
        client_max_body_size    10m;

        # ── API Routes ────────────────────────────────────────────────────────
        location /api/ {
            # Apply standard API rate limit: 10r/s, burst of 20 requests
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend_api;
        }

        # ── Auth Routes (stricter rate limiting) ──────────────────────────────
        location ~ ^/api/auth/(login|register|refresh) {
            # Apply strict auth rate limit: 2r/s, burst of 5 requests
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://backend_api;
        }

        # ── Server-Sent Events (SSE) Stream ───────────────────────────────────
        location /api/notifications/stream {
            # Allow max 3 concurrent SSE connections per IP
            limit_conn sse_conn 3;

            # SSE requires these specific settings to work through nginx
            proxy_pass          http://backend_api;
            proxy_buffering     off;            # Must be off for streaming
            proxy_cache         off;
            proxy_read_timeout  3600s;          # Keep SSE alive for up to 1 hour
            proxy_set_header    Connection      "";  # Override global "upgrade" Connection header
            proxy_http_version  1.1;
            chunked_transfer_encoding on;
        }

        # ── Health Check Endpoint ─────────────────────────────────────────────
        location /health {
            proxy_pass http://backend_api;
            access_log off;  # Reduce log noise from monitoring pings
        }

        # ── Next.js Frontend ──────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend_app;
        }

        # ── Next.js Static Assets (aggressive caching) ─────────────────────
        location /_next/static/ {
            proxy_pass http://frontend_app;
            # Cache Next.js build hashed static assets for 1 year
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Favicon & Robots ─────────────────────────────────────────────────
        location = /favicon.ico {
            proxy_pass  http://frontend_app;
            access_log  off;
            expires     30d;
        }

        location = /robots.txt {
            proxy_pass  http://frontend_app;
            access_log  off;
        }

        # ── Custom Error Pages ───────────────────────────────────────────────
        error_page 429 /429.html;
        location = /429.html {
            default_type text/html;
            return 429 '<!DOCTYPE html><html><head><title>Rate Limited</title></head><body><h1>429 - Too Many Requests</h1><p>Please slow down and try again shortly.</p></body></html>';
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
