# Epic Club Management System — Docker Compose
# Networks:
#   - epicclub-internal: backend services (postgres, redis, backend) — not exposed to nginx
#   - epicclub-proxy: nginx ↔ frontend/backend — nginx bridges the two

version: "3.9"

# ─── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─── Networks ──────────────────────────────────────────────────────────────────
networks:
  # Internal network: database + redis + backend only
  epicclub-internal:
    driver: bridge
    internal: true          # No external internet access from this network
  # Proxy network: nginx ↔ application containers
  epicclub-proxy:
    driver: bridge

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-epicclub_db}
      POSTGRES_USER: ${DB_USER:-epicclub}
      POSTGRES_PASSWORD: ${DB_PASSWORD}         # Required — no default
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run the schema init SQL on first boot
      - ./epicclub-backend/migrations/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - epicclub-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-epicclub} -d ${DB_NAME:-epicclub_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Never expose the database port to the host in production
    # Uncomment the next two lines for local development only:
    # ports:
    #   - "5432:5432"

  # ── Redis Cache / Rate-limit Store ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - epicclub-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Backend API (Node.js / Express) ──────────────────────────────────────────
  backend:
    build:
      context: ./epicclub-backend
      dockerfile: Dockerfile
      target: production
    image: epicclub-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      # Database connection (use components, not DATABASE_URL, to avoid embedding creds in URL)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-epicclub_db}
      DB_USER: ${DB_USER:-epicclub}
      DB_PASSWORD: ${DB_PASSWORD}
      # Redis with password
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      # CORS — nginx acts as the entry point, so allow from there
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    networks:
      - epicclub-internal
      - epicclub-proxy
    # No host port exposure — nginx proxies all traffic
    # Uncomment for local debugging only:
    # ports:
    #   - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Frontend (Next.js Standalone) ────────────────────────────────────────────
  frontend:
    build:
      context: ./epicclub-frontend
      dockerfile: Dockerfile
      target: production
      args:
        # Build-time public env (gets embedded in client bundle)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    image: epicclub-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      NEXTAUTH_URL: ${APP_URL:-http://localhost}
      NEXT_TELEMETRY_DISABLED: 1
    networks:
      - epicclub-proxy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount SSL certs volume (create and populate before deployment)
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Static log directory
      - ./nginx/logs:/var/log/nginx
    networks:
      - epicclub-proxy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
